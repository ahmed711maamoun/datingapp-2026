<app-nav></app-nav>

<div class="card bg-base-100 w-1/2 mx-auto p-10 mt-10 shadow-xl">
    <h3 class="text-3xl text-red-500">{{title}}</h3>
    <ul class="list">
        <li *ngFor="let member of members()" class="list-row items-center border-b border-base-200 py-4">
            <img src="/user.png" alt="user avatar" class="size-12 rounded-box">
            <div>
                <div class="text-sm opacity-50">{{member.displayName}}</div>
                <div class="text-xs text-gray-500">{{member.email}}</div>
            </div>
        </li>
    </ul>
</div>
